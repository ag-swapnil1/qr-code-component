<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
    <title>QR Code Component | Swapnil Agrahari</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main id="big-box">
      <div id="qr-card">
        <div id="qr-container">
          <img src="./images/image-qr-code.png" alt="QR code to visit Frontend Mentor" />
        </div>
        <div id="content-box">
          <h3>Improve your front-end skills by building projects</h3>
          <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/swapnilagrahari" target="_blank" rel="noopener noreferrer">Swapnil Agrahari</a>.
    </footer>
  </body>
</html>
